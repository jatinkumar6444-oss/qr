<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Event Gate Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; min-height: 100vh; color: white; }
    .header { background: #1a1a2e; padding: 16px 20px; text-align: center; border-bottom: 1px solid #2a2a4a; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 12px; color: #888; margin-top: 3px; }
    .scanner-wrap { margin: 20px; border-radius: 16px; overflow: hidden; border: 2px solid #2a2a4a; }
    #reader { width: 100%; }
    .scan-status { background: #1a1a2e; text-align: center; padding: 10px; font-size: 13px; color: #aaa; }
    .manual-section { margin: 0 20px 20px; background: #1a1a2e; border-radius: 12px; padding: 16px; border: 1px solid #2a2a4a; }
    .manual-section label { font-size: 13px; color: #aaa; display: block; margin-bottom: 8px; }
    .input-row { display: flex; gap: 10px; }
    .manual-section input { flex: 1; padding: 12px 14px; background: #0f0f1a; border: 1.5px solid #2a2a4a; border-radius: 8px; color: white; font-size: 15px; outline: none; }
    .manual-section input:focus { border-color: #534AB7; }
    .verify-btn { padding: 12px 18px; background: #534AB7; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
    .result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 30px; }
    .result-overlay.show { display: flex; }
    .result-card { width: 100%; max-width: 360px; border-radius: 20px; padding: 36px 24px; text-align: center; }
    .result-card.success { background: #0d2b1e; border: 2px solid #1D9E75; }
    .result-card.error { background: #2b0d0d; border: 2px solid #E24B4A; }
    .result-icon { font-size: 64px; margin-bottom: 16px; }
    .result-status { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .success .result-status { color: #1D9E75; }
    .error .result-status { color: #E24B4A; }
    .result-name { font-size: 28px; font-weight: 600; color: white; margin-bottom: 6px; }
    .result-id { font-size: 13px; color: #888; margin-bottom: 20px; font-family: monospace; }
    .next-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .success .next-btn { background: #1D9E75; color: white; }
    .error .next-btn { background: #E24B4A; color: white; }
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .loading-overlay.show { display: flex; }
    .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #534AB7; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { color: #aaa; font-size: 15px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Event Gate Scanner</h1>
    <p>QR scan karo ya Guest ID type karo</p>
  </div>
  <div class="scanner-wrap">
    <div id="reader"></div>
    <div class="scan-status" id="scan-status">Camera start ho rahi hai...</div>
  </div>
  <div class="manual-section">
    <label>Manual entry — Guest ID type karo:</label>
    <div class="input-row">
      <input type="text" id="manual-input" placeholder="EVT2026-..." autocomplete="off" />
      <button class="verify-btn" onclick="verifyManual()">Verify</button>
    </div>
  </div>
  <div class="result-overlay" id="result-overlay">
    <div class="result-card" id="result-card">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-status" id="result-status"></div>
      <div class="result-name" id="result-name"></div>
      <div class="result-id" id="result-id"></div>
      <button class="next-btn" onclick="nextGuest()">Next Guest Scan Karo</button>
    </div>
  </div>
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p>Checking...</p>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5g4FArRN3evtJeyvPOb49Wy4Ty_7KGqL86SzdzISYrd1P6koM5DC0JwFiAchUQ50Y/exec';

    let scanner, busy = false;

    function startCamera() {
      scanner = new Html5Qrcode("reader");
      Html5Qrcode.getCameras().then(cameras => {
        if (!cameras || cameras.length === 0) {
          document.getElementById('scan-status').textContent = 'Camera nahi mila — manual use karo';
          return;
        }
        const cam = cameras.find(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('rear')) || cameras[cameras.length - 1];
        scanner.start(cam.id, { fps: 10, qrbox: { width: 250, height: 250 } },
          function(text) {
            if (busy) return;
            busy = true;
            document.getElementById('scan-status').textContent = 'QR detected! Checking...';
            verifyGuest(text);
          }, function() {}
        ).then(() => {
          document.getElementById('scan-status').textContent = 'QR Code scanner ke saamne rakho';
        }).catch(() => {
          document.getElementById('scan-status').textContent = 'Camera error — manual use karo';
        });
      }).catch(() => {
        document.getElementById('scan-status').textContent = 'Camera access nahi mila';
      });
    }

    function verifyManual() {
      const val = document.getElementById('manual-input').value.trim();
      if (!val) { alert('Guest ID daalo!'); return; }
      if (busy) return;
      busy = true;
      verifyGuest(val);
    }

    function verifyGuest(guestId) {
      document.getElementById('loading-overlay').classList.add('show');
      const url = APPS_SCRIPT_URL + '?guestId=' + encodeURIComponent(guestId);

      const cbName = 'gs_cb_' + Date.now();
      const script = document.createElement('script');

      window[cbName] = function(data) {
        document.getElementById('loading-overlay').classList.remove('show');
        document.head.removeChild(script);
        delete window[cbName];
        showResult(data);
      };

      script.src = url + '&callback=' + cbName;
      script.onerror = function() {
        document.getElementById('loading-overlay').classList.remove('show');
        busy = false;
        alert('Connection failed! Apps Script check karo.');
        document.head.removeChild(script);
        delete window[cbName];
      };
      document.head.appendChild(script);
    }

    function showResult(res) {
      if (scanner) { try { scanner.pause(); } catch(e) {} }
      const isSuccess = res.success === true;
      const card = document.getElementById('result-card');
      card.className = 'result-card ' + (isSuccess ? 'success' : 'error');
      document.getElementById('result-icon').textContent = isSuccess ? '✅' : '❌';
      document.getElementById('result-status').textContent = res.message || '';
      document.getElementById('result-name').textContent = res.name || '';
      document.getElementById('result-id').textContent = res.guestId || '';
      document.getElementById('result-overlay').classList.add('show');
    }

    function nextGuest() {
      busy = false;
      document.getElementById('result-overlay').classList.remove('show');
      document.getElementById('manual-input').value = '';
      document.getElementById('scan-status').textContent = 'QR Code scanner ke saamne rakho';
      if (scanner) { try { scanner.resume(); } catch(e) { startCamera(); } }
    }

    document.getElementById('manual-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verifyManual();
    });

    window.onload = startCamera;
  </script>
</body>
</html>
